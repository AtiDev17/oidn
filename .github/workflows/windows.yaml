name: Build OIDN with OpenImageIO

# This allows you to manually trigger the build from the Actions tab
on:
  push:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout OIDN Repository
      uses: actions/checkout@v6
      with:
        submodules: recursive
        lfs: true

    - name: Install ISPC Compiler
      run: |
        Invoke-WebRequest -Uri "https://github.com/ispc/ispc/releases/download/v1.30.0/ispc-v1.30.0-windows.zip" -OutFile "ispc.zip"
        Expand-Archive ispc.zip -DestinationPath .
        echo "${{ github.workspace }}\ispc-v1.30.0-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Cache vcpkg dependencies
      id: vcpkg-cache
      uses: actions/cache@v5
      with:
        path: C:\vcpkg\installed
        key: ${{ runner.os }}-vcpkg-openimageio-tbb

    - name: Install OpenImageIO and TBB (via vcpkg)
      if: steps.vcpkg-cache.outputs.cache-hit != 'true'
      run: |
        vcpkg install tbb openimageio --triplet x64-windows

    - name: Configure CMake
      run: |
        cmake -B build -S . `
          -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
          -DOIDN_APPS=ON `
          -DOIDN_APPS_OPENIMAGEIO=ON `
          -DOIDN_DEVICE_SYCL=OFF `
          -DOIDN_DEVICE_CUDA=OFF `
          -DOIDN_DEVICE_HIP=OFF 

    - name: Build oidnDenoise
      run: |
        cmake --build build --config Release

    - name: Upload Finished .exe as Artifact
      uses: actions/upload-artifact@v7
      with:
        name: oidn-windows-binaries
        path: |
          build/Release/*.exe
          build/Release/*.dll
